# Darrell: Stash Config
# GitHub: https://github.com/Darrellcui/Rules/
# Update: 2026-07-09

# 运行模式：rule/global/direct
mode: rule
# 日志级别：silent/info/warning/error/debug
# 日志级别越高日志输出量越大，越倾向于调试，若需要请自行开启
log-level: silent

# DNS 配置
dns:
  # 是否开启 IPv6 解析
  ipv6: false
  # 用于解析 DoH/DoT 域名的 DNS（需要能访问）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  # 主要 DNS 服务器（国内外混合）
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  # DNS 分流：特定域名使用特定 DNS
  nameserver-policy:
    # ===== AI 服务使用 Cloudflare DNS =====
    "+.openai.com": https://cloudflare-dns.com/dns-query
    "+.chatgpt.com": https://cloudflare-dns.com/dns-query
    "+.anthropic.com": https://cloudflare-dns.com/dns-query
    "+.claude.ai": https://cloudflare-dns.com/dns-query
    "+.perplexity.ai": https://cloudflare-dns.com/dns-query
    "+.gemini.google.com": https://cloudflare-dns.com/dns-query
    # ===== Google 服务 =====
    "+.google.com": https://dns.google/dns-query
    "+.googleapis.com": https://dns.google/dns-query
    "+.gstatic.com": https://dns.google/dns-query
    "+.ggpht.com": https://dns.google/dns-query
    "+.youtube.com": https://dns.google/dns-query
    "+.ytimg.com": https://dns.google/dns-query
    "+.googlevideo.com": https://dns.google/dns-query
    # ===== GitHub =====
    "+.github.com": https://dns.google/dns-query
    "+.githubusercontent.com": https://dns.google/dns-query
    "+.githubassets.com": https://dns.google/dns-query
    # ===== Telegram =====
    "+.telegram.org": https://cloudflare-dns.com/dns-query
    "+.t.me": https://cloudflare-dns.com/dns-query
    # ===== 国内域名使用国内 DNS =====
    "+.cn": https://dns.alidns.com/dns-query
    "+.bilibili.com": https://dns.alidns.com/dns-query
    "+.douyin.com": https://dns.alidns.com/dns-query
    "+.ixigua.com": https://dns.alidns.com/dns-query
    "+.toutiao.com": https://dns.alidns.com/dns-query
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  # 不会解析为 fake IP 的域名
  # 这些域名将返回它们的真实 IP 地址
  fake-ip-filter:
    # ========== Local Network ==========
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - "*.corp"
    - "*.internal"

    # ========== GitHub (SSH connection needs real IP) ==========
    - "+.github.com"
    - "+.githubusercontent.com"
    - "+.githubapp.com"
    - "+.githubassets.com"
    - "github.com"
    - "*.github.com"

    # ========== Time/NTP Services ==========
    - "+.pool.ntp.org"
    - "+.ntp.org.cn"
    - "+.time.edu.cn"
    - "+.time.apple.com"
    - "time1.cloud.tencent.com"
    - "time.windows.com"
    - "time.nist.gov"

    # ========== Network Connectivity Check ==========
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "captive.apple.com"
    - "detectportal.firefox.com"
    - "*.connectivitycheck.gstatic.com"
    - "clients3.google.com"
    - "clients4.google.com"

    # ========== Music Streaming ==========
    - "music.163.com"
    - "*.music.163.com"
    - "*.126.net"
    - "musicapi.taihe.com"
    - "music.taihe.com"
    - "songsearch.kugou.com"
    - "trackercdn.kugou.com"
    - "*.kuwo.cn"
    - "api-jooxtt.sanook.com"
    - "api.joox.com"
    - "joox.com"
    - "y.qq.com"
    - "*.y.qq.com"
    - "streamoc.music.tc.qq.com"
    - "mobileoc.music.tc.qq.com"
    - "isure.stream.qqmusic.qq.com"
    - "dl.stream.qqmusic.qq.com"
    - "aqqmusic.tc.qq.com"
    - "amobile.music.tc.qq.com"
    - "*.xiami.com"
    - "*.music.migu.cn"
    - "music.migu.cn"

    # ========== Gaming Platforms ==========
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.stun.*.*"
    - "xbox.*.microsoft.com"
    - "xnotify.xboxmojie.app"
    - "+.ipv6.microsoft.com"
    - "+.battlenet.com.cn"
    - "+.wotgame.cn"
    - "+.wggames.cn"
    - "+.wowsgame.cn"
    - "+.wargaming.net"
    - "+.pvp.net"
    - "*.square-enix.com"
    - "*.finalfantasyxiv.com"
    - "*.ffxiv.com"
    - "*.ff14.sdo.com"
    - "ff.dorado.sdo.com"

    # ========== Router Management ==========
    - "heartbeat.belkin.com"
    - "*.linksys.com"
    - "*.linksyssmartwifi.com"
    - "*.router.asus.com"
    - "*.hiwifi.com"
    - "*.miwifi.com"
    - "*.routerlogin.com"
    - "*.mymeraki.com"
    - "*.gl-inet.com"

    # ========== Apple Services ==========
    - "mesu.apple.com"
    - "swscan.apple.com"
    - "swquery.apple.com"
    - "swdownload.apple.com"
    - "swcdn.apple.com"
    - "swdist.apple.com"
    - "*.apple.com.edgesuite.net"
    - "push-apple.com.akadns.net"

    # ========== Tencent Related ==========
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"

    # ========== Others ==========
    - "proxy.golang.org"
    - "lens.l.google.com"
    - "stun.l.google.com"
    - "*.mcdn.bilivideo.cn"
    - "+.media.dssott.com"

http:
  url-rewrite:
    - ^https?://(www\.)?(g|google)\.cn https://www.google.com 302

