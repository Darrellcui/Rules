# 分流规则
rules:
  # ========== 广告拦截 ==========
  - RULE-SET,reject,REJECT

  # ========== 自定义多规则 MultiRules ==========
  # 由 Quantumult/Loon 的 MultiRules.list 转写为原生规则（Clash 的 classical 规则集
  # 不携带策略名，因此无法直接复用原文件，改为内联以保留 Apple/EU/US/HK 的分流意图）
  # ----- Apple（推送 / Siri / 中继 / iCloud Private Relay）-----
  - DOMAIN-SUFFIX,push.apple.com,Apple
  - DOMAIN-SUFFIX,akadns.net,Apple
  - DOMAIN-SUFFIX,apple.com.edgekey.net,Apple
  - DOMAIN,guzzoni.apple.com,Apple
  - DOMAIN-SUFFIX,smoot.apple.com,Apple
